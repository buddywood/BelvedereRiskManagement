# Local PostgreSQL for development
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f db
services:
  db:
    image: postgres:16-alpine
    container_name: belvedere-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belvedere
    ports:
      - "5443:5432"
    volumes:
      - belvedere_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d belvedere"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  belvedere_pgdata:
